version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: telemetry_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: industrial_telemetry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d industrial_telemetry"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: telemetry_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:pass@postgres_db:5432/industrial_telemetry

    depends_on:
      postgres_db:
        condition: service_healthy

volumes:
  postgres_data: